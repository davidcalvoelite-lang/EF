name: Deploy AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno de despliegue"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          for SERVICE in api-gateway auth-service users-service; do
            docker build -f infrastructure/docker/Dockerfile.$SERVICE -t $ECR_REGISTRY/ef-platform-$SERVICE:${{ github.sha }} apps/backend
            docker push $ECR_REGISTRY/ef-platform-$SERVICE:${{ github.sha }}
            docker tag $ECR_REGISTRY/ef-platform-$SERVICE:${{ github.sha }} $ECR_REGISTRY/ef-platform-$SERVICE:latest
            docker push $ECR_REGISTRY/ef-platform-$SERVICE:latest
          done

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ef-platform-${{ inputs.environment }} --region ${{ env.AWS_REGION }}

      - name: Deploy to Kubernetes
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          kubectl apply -f infrastructure/kubernetes/namespace.yaml
          kubectl apply -f infrastructure/kubernetes/configmap.yaml
          envsubst < infrastructure/kubernetes/services/api-gateway.yaml | kubectl apply -f -
          envsubst < infrastructure/kubernetes/services/auth-service.yaml | kubectl apply -f -
          envsubst < infrastructure/kubernetes/services/users-service.yaml | kubectl apply -f -
