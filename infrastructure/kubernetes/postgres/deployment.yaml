apiVersion: apps/v1
kind: Deployment
metadata:
  name: ef-postgres
  namespace: ef-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ef-postgres
  template:
    metadata:
      labels:
        app: ef-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: ef-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ef-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: ef-config
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: ef-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ef-postgres
  namespace: ef-platform
spec:
  selector:
    app: ef-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ef-postgres-pvc
  namespace: ef-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
