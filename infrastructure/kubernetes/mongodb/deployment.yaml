apiVersion: apps/v1
kind: Deployment
metadata:
  name: ef-mongodb
  namespace: ef-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ef-mongodb
  template:
    metadata:
      labels:
        app: ef-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: ef_user
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ef-secrets
                  key: MONGO_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: ef_mongo
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: ef-mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ef-mongodb
  namespace: ef-platform
spec:
  selector:
    app: ef-mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ef-mongodb-pvc
  namespace: ef-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
