apiVersion: apps/v1
kind: Deployment
metadata:
  name: ef-users-service
  namespace: ef-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ef-users-service
  template:
    metadata:
      labels:
        app: ef-users-service
    spec:
      containers:
        - name: users-service
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/ef-users-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: ef-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ef-secrets
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: ef-users-service
  namespace: ef-platform
spec:
  selector:
    app: ef-users-service
  ports:
    - port: 3002
      targetPort: 3002
