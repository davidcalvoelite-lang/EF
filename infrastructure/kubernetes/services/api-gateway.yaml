apiVersion: apps/v1
kind: Deployment
metadata:
  name: ef-api-gateway
  namespace: ef-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ef-api-gateway
  template:
    metadata:
      labels:
        app: ef-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/ef-api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ef-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ef-api-gateway
  namespace: ef-platform
spec:
  type: LoadBalancer
  selector:
    app: ef-api-gateway
  ports:
    - port: 80
      targetPort: 3000
