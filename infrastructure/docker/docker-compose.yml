services:
  postgres:
    image: postgres:16-alpine
    container_name: ef-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ef_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ef_password}
      POSTGRES_DB: ${POSTGRES_DB:-ef_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ef_user} -d ${POSTGRES_DB:-ef_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: ef-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-ef_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-ef_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-ef_mongo}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ../../apps/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.api-gateway
    container_name: ef-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      API_GATEWAY_PORT: 3000
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 3001
      USERS_SERVICE_HOST: users-service
      USERS_SERVICE_PORT: 3002
    depends_on:
      auth-service:
        condition: service_started
      users-service:
        condition: service_started

  auth-service:
    build:
      context: ../../apps/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.auth-service
    container_name: ef-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      AUTH_SERVICE_HOST: 0.0.0.0
      AUTH_SERVICE_PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ef_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ef_password}
      POSTGRES_DB: ${POSTGRES_DB:-ef_db}
      JWT_SECRET: ${JWT_SECRET:-ef-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  users-service:
    build:
      context: ../../apps/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.users-service
    container_name: ef-users-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      USERS_SERVICE_HOST: 0.0.0.0
      USERS_SERVICE_PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ef_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ef_password}
      POSTGRES_DB: ${POSTGRES_DB:-ef_db}
      MONGODB_URI: mongodb://${MONGO_USER:-ef_user}:${MONGO_PASSWORD:-ef_password}@mongodb:27017/${MONGO_DB:-ef_mongo}?authSource=admin
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  postgres_data:
  mongodb_data:
